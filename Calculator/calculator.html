<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator </title>
    <style>
        body {
            background: #F6F6F6;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculator {
            width: 330px;
        }

        .screen {
            width: 100%;
            height: 120px;
            font-size: 36px;
            text-align: right;
            border: none;
            outline: none;
            background: white;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 10px;
        }

        .keys {
            margin-top: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            height: 65px;
            font-size: 22px;
            border: none;
            border-radius: 50px;
            background: #E5E5E5;
            cursor: pointer;
        }

        .equal {
            background: #535353;
            color: white;
        }

        .zero {
            grid-column: span 1;
        }

        .back {
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="calculator">
        <input type="text" class="screen" disabled>

        <div class="keys">
            <button class="btn">AC</button>
            <button class="btn">()</button>
            <button class="btn">%</button>
            <button class="btn">÷</button>

            <button class="btn">7</button>
            <button class="btn">8</button>
            <button class="btn">9</button>
            <button class="btn">×</button>

            <button class="btn">4</button>
            <button class="btn">5</button>
            <button class="btn">6</button>
            <button class="btn">-</button>

            <button class="btn">1</button>
            <button class="btn">2</button>
            <button class="btn">3</button>
            <button class="btn">+</button>

            <button class="btn ">0</button>
            <button class="btn">.</button>
            <button class="btn">⌫</button>
            <button class="btn">=</button>
        </div>
    </div>
    <script>
        let screen = document.querySelector(".screen");
        let buttons = document.querySelectorAll(".btn");

        let input = "";

        buttons.forEach(btn => {
            btn.addEventListener("click", () => {
                let value = btn.innerText;

                if (value === "AC") {
                    input = ""
                    screen.value = "0";
                    return;
                }
                if (value === "⌫") {
                    input = input.slice(0, -1);
                    screen.value = input;
                    return;
                }
               
                if (value === "=") {
                    let calculation = input
                        .split("×").join("*")
                        .split("÷").join("/")
                        .split("%").join("%");
                    let result = eval(calculation);
                    screen.value = result;

                    return;
                }

                if (value==="()") {
                  
                    
                    screen.value=input
                }  
                input += value;
                screen.value = input;
            });
        });
    </script>
</body>

</html>
